<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guest List - Regine's 18th Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #1a0b2e;
        --gold: #c9a86b;
        --text: #e0d4f5;
        --text-dim: rgba(224, 212, 245, 0.65);
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html, body {
        height: 100%;
    }
    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Montserrat', sans-serif;
        overflow-x: hidden;
        position: relative;
    }
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at top, #2d1548 0%, #1a0b2e 60%);
        z-index: -2;
    }
    .aurora {
        position: fixed;
        inset: 0;
        overflow: hidden;
        z-index: -1;
        pointer-events: none;
    }
    .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.5;
        mix-blend-mode: screen;
    }
    .b1 {
        width: 500px; height: 500px;
        background: #7c3aed;
        top: -10%; left: -15%;
        animation: float 22s ease-in-out infinite;
    }
    .b2 {
        width: 450px; height: 450px;
        background: #c9a86b;
        bottom: -15%; right: -10%;
        opacity: 0.25;
        animation: float 28s ease-in-out infinite reverse;
    }
    .b3 {
        width: 400px; height: 400px;
        background: #4c1d95;
        top: 30%; left: 60%;
        opacity: 0.4;
        animation: float 25s ease-in-out infinite;
    }
    @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(40px, -30px) scale(1.05); }
        66% { transform: translate(-30px, 20px) scale(0.95); }
    }
    .wrap {
        position: relative;
        z-index: 1;
        max-width: 880px;
        margin: 0 auto;
        padding: 48px 20px 80px;
    }
    header {
        text-align: center;
        margin-bottom: 36px;
    }
    .crown {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        color: var(--gold);
        filter: drop-shadow(0 0 20px rgba(201, 168, 107, 0.4));
    }
    .crown svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.25;
    }
    h1 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: clamp(2.4rem, 6vw, 3.75rem);
        line-height: 1.1;
        margin: 0;
        background: linear-gradient(180deg, #ffffff 20%, #f5e6c8 50%, var(--gold) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.5px;
    }
    .subtitle {
        font-family: 'Dancing Script', cursive;
        font-size: clamp(1.3rem, 3vw, 1.65rem);
        color: var(--gold);
        margin-top: 8px;
        opacity: 0.95;
    }
    .glass {
        background: rgba(20, 8, 38, 0.55);
        backdrop-filter: blur(24px) saturate(140%);
        -webkit-backdrop-filter: blur(24px) saturate(140%);
        border: 1px solid rgba(201, 168, 107, 0.18);
        border-radius: 28px;
        box-shadow:
            0 25px 70px rgba(0, 0, 0, 0.55),
            inset 0 1px 0 rgba(255, 255, 255, 0.06),
            inset 0 -1px 0 rgba(0, 0, 0, 0.4);
        padding: 36px;
        position: relative;
        overflow: hidden;
    }
    .glass::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,107,0.5), transparent);
    }
    .stats {
        display: flex;
        justify-content: center;
        align-items: center;
        padding-bottom: 28px;
        margin-bottom: 28px;
        border-bottom: 1px solid rgba(201, 168, 107, 0.12);
    }
    .stat {
        text-align: center;
    }
    .stat-label {
        display: block;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-dim);
        font-weight: 500;
        margin-bottom: 8px;
    }
    .stat-number {
        font-family: 'Playfair Display', serif;
        font-size: 4rem;
        line-height: 1;
        color: var(--gold);
        text-shadow: 0 0 30px rgba(201, 168, 107, 0.35), 0 0 60px rgba(201, 168, 107, 0.2);
        transition: transform 0.2s ease;
        display: inline-block;
    }
    .list-container {
        max-height: 1000px;
        overflow: hidden;
        transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #guestList {
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px 18px;
        margin: 0;
        padding: 4px;
    }
    #guestList li {
        position: relative;
        padding: 14px 16px 14px 34px;
        color: #e0d4f5;
        background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
        border: 1px solid rgba(201, 168, 107, 0.1);
        border-radius: 14px;
        font-weight: 400;
        font-size: 0.98rem;
        letter-spacing: 0.2px;
        transition: all 0.3s ease;
        overflow: hidden;
    }
    #guestList li::before {
        content: "✦";
        position: absolute;
        left: 13px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--gold);
        font-size: 0.85rem;
        opacity: 0.85;
        text-shadow: 0 0 8px rgba(201, 168, 107, 0.5);
    }
    #guestList li:hover {
        background: rgba(201, 168, 107, 0.08);
        border-color: rgba(201, 168, 107, 0.28);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    #guestList li:only-child {
        grid-column: 1 / -1;
        text-align: center;
        padding: 24px;
        color: var(--text-dim);
        font-style: italic;
        background: rgba(255,255,255,0.02);
    }
    #guestList li:only-child::before {
        display: none;
    }
    .actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        align-items: center;
        margin-top: 36px;
        padding-top: 28px;
        border-top: 1px solid rgba(201, 168, 107, 0.12);
        flex-wrap: wrap;
    }
    .btn {
        appearance: none;
        border: none;
        cursor: pointer;
        font-family: 'Montserrat', sans-serif;
        font-weight: 500;
        font-size: 0.94rem;
        padding: 12px 26px;
        border-radius: 999px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        letter-spacing: 0.3px;
        white-space: nowrap;
    }
    .btn-refresh {
        background: linear-gradient(135deg, #d4b67a 0%, var(--gold) 50%, #b8955a 100%);
        color: #1a0b2e;
        font-weight: 600;
        box-shadow:
            0 4px 16px rgba(201, 168, 107, 0.3),
            inset 0 1px 0 rgba(255,255,255,0.3);
        position: relative;
        overflow: hidden;
    }
    .btn-refresh::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.6s;
    }
    .btn-refresh:hover::before {
        left: 100%;
    }
    .btn-refresh:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(201, 168, 107, 0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    }
    .btn-refresh:active {
        transform: translateY(0);
    }
    .btn-refresh.loading svg {
        animation: spin 1s linear infinite;
    }
    .btn-refresh:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    .btn-back {
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        border: 1px solid rgba(201, 168, 107, 0.22);
        backdrop-filter: blur(10px);
    }
    .btn-back:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(201, 168, 107, 0.4);
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .btn svg {
        width: 18px;
        height: 18px;
        stroke-width: 2;
    }
    @media (max-width: 720px) {
        .wrap { padding: 32px 16px 60px; }
        .glass { padding: 26px 18px; border-radius: 24px; }
        #guestList { grid-template-columns: 1fr; gap: 10px; }
        .stat-number { font-size: 3.2rem; }
        .actions { flex-direction: column-reverse; align-items: stretch; }
        .btn { justify-content: center; width: 100%; }
    }
</style>
</head>
<body>
    <div class="aurora">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
        <div class="blob b3"></div>
    </div>

    <main class="wrap">
        <header>
            <div class="crown" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                    <path d="M3 9l3.5 9h11L21 9l-5 3-4-7-4 7-5-3z"/>
                    <path d="M8.5 18v3M15.5 18v3M5.5 9v-1.5a1.5 1.5 0 0 1 3 0V9M15 9v-1.5a1.5 1.5 0 0 1 3 0V9"/>
                    <circle cx="12" cy="5.5" r="1.2" fill="currentColor" stroke="none"/>
                </svg>
            </div>
            <h1>Guest List</h1>
            <p class="subtitle">Regine's 18th Birthday</p>
        </header>

        <section class="glass">
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Confirmed Guests</span>
                    <span class="stat-number" id="totalGuests">--</span>
                </div>
            </div>

            <div id="guestListContainer" class="list-container">
                <ul id="guestList" aria-live="polite">
                    <li>Loading...</li>
                </ul>
            </div>

            <div class="actions">
                <a href="index.html" class="btn btn-back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Invitation
                </a>
                <button id="refreshBtn" class="btn btn-refresh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
                    Refresh List
                </button>
            </div>
        </section>
    </main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHfcQN9zbfMBbsFJujBRCx6Ts7-jv_PEq-GI5HyJmNKlBxVCxpEDI4YVPpDUHvnRbBjg/exec";

async function loadGuestList() {
    const listElement = document.getElementById('guestList');
    try {
        const response = await fetch(SCRIPT_URL);
        const guests = await response.json();
        
        listElement.innerHTML = guests.length > 0 
            ? guests.map(name => `<li>${name}</li>`).join('') 
            : "<li>No guests yet.</li>";
        
        // Update parent container height to fit new items
        const parentContent = listElement.parentElement;
        parentContent.style.maxHeight = parentContent.scrollHeight + "px";
    } catch (error) {
        listElement.innerHTML = "<li>Error loading list.</li>";
    }
}

function updateTotalCount() {
    const listElement = document.getElementById('guestList');
    const totalEl = document.getElementById('totalGuests');
    const items = listElement.querySelectorAll('li');
    const firstText = items[0]?.textContent.trim() || '';
    
    let count = 0;
    if (items.length && !['Loading...', 'No guests yet.', 'Error loading list.'].includes(firstText)) {
        count = items.length;
    }
    
    totalEl.textContent = count;
    totalEl.style.transform = 'scale(1.15)';
    setTimeout(() => { totalEl.style.transform = 'scale(1)'; }, 180);
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadGuestList();
    updateTotalCount();
});

document.getElementById('refreshBtn').addEventListener('click', async () => {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading');
    btn.disabled = true;
    
    await loadGuestList();
    updateTotalCount();
    
    setTimeout(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
    }, 400);
});
</script>
</body>
</html>
